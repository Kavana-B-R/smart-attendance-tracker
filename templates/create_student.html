<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Student - Smart Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-card {
            max-width: 500px;
            margin: 100px auto;
            background: var(--glass);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid var(--glass-border);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="form-card">
        <div class="login-header">
            <div class="login-icon"><i class="fas fa-user-plus"></i></div>
            <h2>Create Student Account</h2>
            <p>Add a new student to the system</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/teacher/student/create" method="POST">
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Student ID</label>
                <input type="text" name="student_id" placeholder="Enter unique Student ID" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Student Name</label>
                <input type="text" name="name" placeholder="Enter student name" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" placeholder="Enter email address" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-plus"></i> Create Student
            </button>
        </form>

        <div class="login-footer" style="margin-top: 25px;">
            <a href="/teacher/students/manage"><i class="fas fa-arrow-left"></i> Back to Students</a>
        </div>
    </div>
</body>
</html>
