<!DOCTYPE html>
<html>
<head>
    <title>Easy Face Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; max-width: 800px; margin: auto; padding: 20px; }
        video { width: 400px; height: 300px; border: 2px solid #007bff; }
        #status { margin: 20px; padding: 10px; border-radius: 5px; font-weight: bold; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        canvas { display: none; }
    </style>
</head>
<body>
    <h1>📸 Easy Face Registration for Student1</h1>
    <p>Click "Register My Face" → look at camera → auto-detects & saves.</p>
    
    <video id="video" autoplay muted playsinline></video>
    <br>
    <button onclick="loadModels()">Load AI</button>
    <button onclick="registerFace()" id="registerBtn" disabled>Register My Face</button>
    
    <div id="status"></div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const registerBtn = document.getElementById('registerBtn');

        let modelsLoaded = false;

        async function loadModels() {
            status.textContent = 'Loading face detection...';
            status.className = '';
            
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
            
            modelsLoaded = true;
            registerBtn.disabled = false;
            status.textContent = '✅ AI loaded! Camera ready.';
            status.className = 'success';
            startVideo();
        }

        async function startVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
            } catch(err) {
                status.textContent = 'Camera error: ' + err;
                status.className = 'error';
            }
        }

        async function registerFace() {
            registerBtn.disabled = true;
            status.textContent = 'Detecting face...';
            
            const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!detections) {
                status.textContent = 'No face detected. Try again.';
                status.className = 'error';
                registerBtn.disabled = false;
                return;
            }
            
            // Capture frame
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            // Send descriptor (128d vector) to backend
            const descriptor = Array.from(detections.descriptor);
            
            const response = await fetch('/register_face', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({descriptor: descriptor})
            });
            
            const result = await response.json();
            status.textContent = result.message;
            status.className = result.success ? 'success' : 'error';
            registerBtn.disabled = false;
        }
    </script>
</body>
</html>
